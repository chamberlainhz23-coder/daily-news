name: Daily Global News

on:
  schedule:
    # GitHub Actions 在整点容易高负载，避开 08:00，改为北京时间 08:07（UTC 00:07）。
    - cron: "7 0 * * *"
  workflow_dispatch:

jobs:
  daily-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          NEWS_FEEDS: ${{ secrets.NEWS_FEEDS }}
          MAX_NEWS_ITEMS: ${{ secrets.MAX_NEWS_ITEMS }}
          MAX_CANDIDATES: ${{ secrets.MAX_CANDIDATES }}
          MAX_PER_FEED: ${{ secrets.MAX_PER_FEED }}
          LLM_MAX_TOKENS: ${{ secrets.LLM_MAX_TOKENS }}
          BRIEFING_DETAIL_LEVEL: ${{ secrets.BRIEFING_DETAIL_LEVEL }}
          DRY_RUN: "false"
        run: python main.py
